<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PrivoDiary – A softer way to notice your day</title>
  <meta name="description" content="PrivoDiary helps you gently record real moments during the day and revisit them as a calm, private daily story." />
  <meta property="og:title" content="PrivoDiary" />
  <meta property="og:description" content="A private video diary for calm reflection and real moments." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="assets/icon.png" />
  <link rel="icon" href="assets/icon.png" />
  <style>
    :root {
      --bg: #f6f2f8;
      --panel: rgba(255,255,255,0.76);
      --panel-strong: rgba(255,255,255,0.88);
      --text: #241a2d;
      --muted: #736785;
      --line: rgba(122, 105, 147, 0.14);
      --primary: #8570ad;
      --primary-2: #b8a4d7;
      --accent: #d8a66a;
      --accent-2: #ead0ab;
      --gold: #dcc79e;
      --soft: rgba(133, 112, 173, 0.08);
      --soft-accent: rgba(216, 166, 106, 0.14);
      --max: 1180px;
      --shadow: 0 18px 48px rgba(60, 45, 76, 0.08);
      --shadow-soft: 0 10px 24px rgba(60, 45, 76, 0.05);
      --radius: 28px;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: var(--text);
      line-height: 1.6;
      background:
        radial-gradient(circle at top left, rgba(234, 208, 171, 0.18), transparent 28%),
        radial-gradient(circle at 85% 8%, rgba(184, 164, 215, 0.16), transparent 24%),
        radial-gradient(circle at 50% 100%, rgba(255,255,255,0.35), transparent 28%),
        linear-gradient(180deg, #fbf9fc 0%, #f3eef6 100%);
    }
    img { max-width: 100%; display: block; }
    a { color: inherit; }
    .wrap { width: min(calc(100% - 32px), var(--max)); margin: 0 auto; }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 40;
      backdrop-filter: blur(16px);
      background: rgba(250,248,252,0.82);
      border-bottom: 1px solid rgba(111,81,160,0.08);
    }
    .topbar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 0;
    }
    .brand { display:flex; align-items:center; gap:14px; text-decoration:none; }
    .brand img { width: 44px; height: 44px; border-radius: 14px; box-shadow: 0 10px 22px rgba(255,140,26,0.20); }
    .brand-name { font-size: 22px; font-weight: 800; letter-spacing: -0.03em; }
    .brand-tag { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .nav { display:flex; gap:10px; align-items:center; flex-wrap:wrap; justify-content:flex-end; }
    .nav a, .lang-switch button {
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.55);
      border-radius: 999px;
      padding: 10px 14px;
      text-decoration: none;
      color: var(--muted);
      font-size: 14px;
      cursor: pointer;
    }
    .nav a:hover, .lang-switch button:hover, .lang-switch button.active { color: var(--text); border-color: rgba(130,88,205,0.26); background: #fff; }
    .lang-switch { display:flex; gap:8px; }
    header.hero { padding: 54px 0 46px; }
    .hero-grid { display:grid; grid-template-columns: 1.05fr .95fr; gap: 34px; align-items:center; }
    .eyebrow {
      display:inline-flex; align-items:center; gap:10px; padding: 8px 14px;
      border-radius: 999px; background: rgba(255,255,255,0.6); color: #806b4f; border:1px solid rgba(216,166,106,0.22);
      font-size:14px; font-weight:600; margin-bottom: 18px;
    }
    h1 { margin: 0 0 16px; font-size: clamp(42px, 7vw, 74px); line-height: 0.98; letter-spacing: -0.05em; }
    .hero p { margin: 0 0 18px; font-size: 18px; color: var(--muted); max-width: 640px; }
    .cta-row { display:flex; gap:14px; flex-wrap:wrap; margin-top: 28px; }
    .btn {
      display:inline-flex; align-items:center; justify-content:center; gap:10px;
      min-height: 54px; padding: 0 22px; border-radius: 18px; border:1px solid transparent;
      text-decoration:none; font-weight:700; box-shadow: var(--shadow);
    }
    .btn.primary { background: linear-gradient(135deg, #7f6b9f, #9785b4 58%, #baa9cf); color:#fff; box-shadow: 0 14px 28px rgba(133,112,173,0.18); }
    .btn.secondary { background: rgba(255,255,255,0.82); border-color: var(--line); color: var(--text); box-shadow: var(--shadow-soft); }
    .hero-note { margin-top:18px; font-size: 14px; color: var(--muted); }

    .premium-chip {
      letter-spacing: .01em;
      display:inline-flex; align-items:center; gap:8px; margin-top: 14px; padding: 8px 14px;
      border-radius: 999px; border:1px solid rgba(242,196,111,0.38);
      background: linear-gradient(180deg, rgba(255,255,255,0.78), rgba(245,240,248,0.92));
      color: #78688f; font-size: 13px; font-weight: 700; box-shadow: var(--shadow-soft);
    }
    .premium-chip::before { content: '◦'; color: var(--primary); font-size: 16px; }
    .beta-callout {
      margin-top: 22px; max-width: 640px; padding: 16px 18px; border-radius: 20px;
      background: linear-gradient(180deg, rgba(255,255,255,0.84), rgba(243,238,246,0.82));
      border:1px solid rgba(133,112,173,0.12); box-shadow: var(--shadow-soft); color: var(--text);
    }
    .beta-callout strong { display:block; margin-bottom: 4px; font-size: 15px; }
    .beta-callout span { color: var(--muted); font-size: 14px; }

    .hero-visual { position: relative; }
    .phone-stack {
      display: grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      grid-template-rows: repeat(7, minmax(44px, auto));
      gap: 16px;
      align-items: stretch;
    }
    .phone {
      position: relative;
      border-radius: 34px;
      overflow: hidden;
      background: #e9dff4;
      border: 1px solid rgba(111,81,160,0.12);
      box-shadow: var(--shadow);
      min-width: 0;
    }
    .phone img { width:100%; height:100%; object-fit: cover; }
    .phone.main { grid-column: 5 / 11; grid-row: 1 / 6; transform: rotate(4deg); z-index: 2; }
    .phone.side { grid-column: 1 / 6; grid-row: 2 / 6; transform: rotate(-6deg); z-index: 1; }
    .phone.bottom { grid-column: 7 / 12; grid-row: 5 / 8; transform: rotate(-2deg); z-index: 3; }
    .floating-card {
      position: relative;
      grid-column: 1 / 5;
      grid-row: 5 / 7;
      z-index: 4;
      align-self: center;
      max-width: 100%;
      border-radius: 22px; padding: 16px 18px; background: linear-gradient(180deg, rgba(255,255,255,0.86), rgba(244,239,248,0.84)); border:1px solid rgba(133,112,173,0.10); box-shadow: var(--shadow);
    }
    .floating-card strong { display:block; font-size:15px; margin-bottom:6px; }
    .floating-card span { color: var(--muted); font-size:14px; }
    section { padding: 28px 0; }
    .section-head { margin-bottom: 22px; }
    .section-head .label { font-size: 13px; text-transform: uppercase; letter-spacing: .12em; color: var(--primary); font-weight: 800; }
    .section-head h2 { margin: 10px 0 10px; font-size: clamp(28px, 4vw, 48px); line-height: 1.02; letter-spacing: -0.04em; }
    .section-head p { margin:0; color: var(--muted); max-width: 720px; font-size:17px; }
    .grid-3 { display:grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
    .grid-2 { display:grid; grid-template-columns: repeat(2, 1fr); gap: 18px; }
    .card {
      background: var(--panel); border:1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); padding: 24px;
      backdrop-filter: blur(12px);
    }
    .icon-badge {
      width: 50px; height: 50px; border-radius: 16px; display:grid; place-items:center; margin-bottom: 18px;
      background: var(--soft); color: var(--primary); font-size: 22px;
    }
    .card h3 { margin: 0 0 8px; font-size: 22px; letter-spacing: -0.03em; }
    .card p { margin:0; color: var(--muted); }
    .steps .step-num { font-size: 13px; color: var(--primary); font-weight: 800; letter-spacing: .12em; text-transform: uppercase; margin-bottom: 8px; }
    .showcase { display:grid; grid-template-columns: .92fr 1.08fr; gap: 18px; }
    .video-showcase { display:grid; grid-template-columns: 1.02fr .98fr; gap: 18px; align-items: center; }
    .video-frame {
      position: relative;
      overflow: hidden;
      border-radius: 30px;
      background: linear-gradient(180deg, rgba(255,255,255,0.9), rgba(241,235,246,0.88));
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      padding: 14px;
    }
    .video-frame video {
      width: 100%;
      display: block;
      border-radius: 24px;
      aspect-ratio: 9 / 16;
      object-fit: cover;
      background: #000;
    }
    .video-meta {
      display:flex;
      justify-content: space-between;
      gap: 10px;
      align-items:center;
      margin-top: 12px;
      color: var(--muted);
      font-size: 14px;
    }
    .video-points { display:grid; gap: 12px; }
    .point { padding: 18px 20px; border-radius: 24px; background: var(--panel); border:1px solid var(--line); box-shadow: var(--shadow-soft); }
    .point strong { display:block; margin-bottom: 6px; font-size: 18px; letter-spacing: -0.02em; }
    .point span { color: var(--muted); }
    .showcase-copy ul { padding-left: 20px; margin: 12px 0 0; color: var(--muted); }
    .showcase-copy li { margin-bottom: 8px; }
    .screens-grid { display:grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
    .screen-card { background: var(--panel-strong); border:1px solid var(--line); border-radius: 30px; overflow:hidden; box-shadow: var(--shadow); }
    .screen-card img { width:100%; aspect-ratio: 9/16; object-fit: cover; object-position: top; }
    .screen-card .caption { padding: 14px 16px 16px; color: var(--muted); font-size: 14px; }
    .quote {
      display:grid; grid-template-columns: 1.2fr .8fr; gap:18px; align-items:stretch;
    }
    .quote .card { display:flex; flex-direction:column; justify-content:space-between; }
    .quote blockquote { font-size: clamp(22px, 3vw, 34px); line-height: 1.14; letter-spacing: -0.04em; margin:0 0 16px; }
    .pills { display:flex; flex-wrap:wrap; gap:10px; margin-top:18px; }
    .pill { padding: 10px 14px; border-radius:999px; background: rgba(255,255,255,0.7); border:1px solid var(--line); color: var(--muted); font-size:14px; }
    .pricing { display:grid; grid-template-columns: repeat(2, 1fr); gap:18px; }
    .pricing .plan { padding: 26px; border-radius: 30px; background: var(--panel); border:1px solid var(--line); box-shadow: var(--shadow); }
    .plan.featured { background: linear-gradient(180deg, rgba(133,112,173,0.10), rgba(255,255,255,0.94) 58%, rgba(245,240,248,0.96)); border-color: rgba(133,112,173,0.16); }
    .plan .tag { display:inline-block; padding: 7px 12px; border-radius:999px; font-size:13px; font-weight:700; margin-bottom:14px; }
    .plan.basic .tag { background: rgba(255,255,255,0.8); color: var(--muted); border:1px solid var(--line); }
    .plan.featured .tag { background: rgba(130,88,205,0.14); color: var(--primary); border:1px solid rgba(130,88,205,0.18); }
    .price { font-size: 42px; line-height: 1; letter-spacing: -0.05em; margin: 0 0 6px; }
    .plan p { color: var(--muted); margin-top: 0; }
    .plan ul { padding-left: 20px; color: var(--muted); }
    .plan li { margin-bottom: 8px; }
    .faq .item { padding: 18px 0; border-top: 1px solid var(--line); }
    .faq .item:first-child { border-top: none; }
    .faq h3 { margin:0 0 8px; font-size:18px; }
    .faq p { margin:0; color: var(--muted); }
    .final-card {
      padding: 34px; border-radius: 34px; background:
        radial-gradient(circle at top right, rgba(234,208,171,0.16), transparent 32%),
        radial-gradient(circle at bottom left, rgba(184,164,215,0.12), transparent 26%),
        linear-gradient(180deg, rgba(255,255,255,0.90), rgba(244,239,248,0.86));
      border:1px solid rgba(133,112,173,0.12); box-shadow: var(--shadow);
      display:grid; grid-template-columns: 1.1fr .9fr; gap: 18px; align-items:center;
    }
    .mini-links { display:flex; gap:10px; flex-wrap:wrap; margin-top:16px; }
    .mini-links a { text-decoration:none; color: var(--muted); padding:10px 14px; border-radius:999px; border:1px solid var(--line); background: rgba(255,255,255,0.7); }
    footer { padding: 28px 0 54px; color: var(--muted); }
    footer .foot { display:flex; justify-content:space-between; gap:16px; flex-wrap:wrap; border-top:1px solid var(--line); padding-top:20px; }
    @media (max-width: 1160px) {
      .hero-grid { grid-template-columns: 1fr; }
      .hero-visual { max-width: 760px; margin: 0 auto; }
      .showcase, .quote, .final-card, .video-showcase { grid-template-columns: 1fr; }
    }
    @media (max-width: 860px) {
      .grid-3, .grid-2, .pricing, .screens-grid { grid-template-columns: 1fr; }
      .topbar-inner { flex-direction: column; align-items: stretch; }
      .nav { justify-content: space-between; }
      .phone-stack { grid-template-columns: repeat(6, minmax(0, 1fr)); grid-template-rows: auto; }
      .phone.side { grid-column: 1 / 4; grid-row: 2 / 4; }
      .phone.main { grid-column: 3 / 7; grid-row: 1 / 4; }
      .phone.bottom { grid-column: 2 / 6; grid-row: 4 / 6; }
      .floating-card { grid-column: 1 / 4; grid-row: 4 / 5; }
    }
    @media (max-width: 620px) {
      .nav { gap:8px; }
      .nav-links { display:none !important; }
      h1 { font-size: 42px; }
      .hero p { font-size: 16px; }
      .cta-row { flex-direction: column; }
      .btn { width: 100%; }
      .phone-stack { grid-template-columns: 1fr; gap: 14px; }
      .phone, .phone.side, .phone.main, .phone.bottom, .floating-card {
        grid-column: auto;
        grid-row: auto;
        transform: none;
      }
      .phone { max-width: 320px; margin: 0 auto; }
      .floating-card { max-width: 320px; margin: 0 auto; padding: 14px; font-size: 13px; }
      .card, .plan, .final-card { padding: 22px; border-radius: 24px; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="wrap topbar-inner">
      <a class="brand" href="#top">
        <img src="assets/icon.png" alt="PrivoDiary icon">
        <div>
          <div class="brand-name">PrivoDiary</div>
          <div class="brand-tag" data-i18n="brandTag"></div>
        </div>
      </a>
      <div class="nav">
        <div class="nav-links" style="display:flex; gap:10px; flex-wrap:wrap;">
          <a href="#how" data-i18n="navHow"></a>
          <a href="#why" data-i18n="navWhy"></a>
          <a href="#premium" data-i18n="navPremium"></a>
          <a href="#faq" data-i18n="navFaq"></a>
        </div>
        <div class="lang-switch" aria-label="Language switcher">
          <button data-lang="en">EN</button>
          <button data-lang="es">ES</button>
          <button data-lang="ru">RU</button>
        </div>
      </div>
    </div>
  </div>

  <header class="hero wrap" id="top">
    <div class="hero-grid">
      <div>
        <div class="eyebrow" data-i18n="heroEyebrow"></div>
        <h1 data-i18n="heroTitle"></h1>
        <p data-i18n="heroText"></p>
        <div class="cta-row">
          <a class="btn primary" href="mailto:support@privodiary.com?subject=PrivoDiary%20closed%20testing" data-i18n="ctaPrimary"></a>
          <a class="btn secondary" href="/privacy/" id="privacyButton" data-i18n="ctaSecondary"></a>
        </div>
        <div class="premium-chip" data-i18n="premiumChip"></div>
        <div class="beta-callout"><strong data-i18n="betaTitle"></strong><span data-i18n="betaText"></span></div>
        <div class="hero-note" data-i18n="heroNote"></div>
      </div>
      <div class="hero-visual">
        <div class="phone-stack">
          <div class="phone side"><img src="assets/records.jpg" alt="Records screen"></div>
          <div class="phone main"><img src="assets/recording.jpg" alt="Recording screen"></div>
          <div class="phone bottom"><img src="assets/note.jpg" alt="Text note screen"></div>
          <div class="floating-card">
            <strong data-i18n="floatingTitle"></strong>
            <span data-i18n="floatingText"></span>
          </div>
        </div>
      </div>
    </div>
  </header>

  <section id="how">
    <div class="wrap">
      <div class="section-head">
        <div class="label" data-i18n="howLabel"></div>
        <h2 data-i18n="howTitle"></h2>
        <p data-i18n="howText"></p>
      </div>
      <div class="grid-3 steps">
        <div class="card">
          <div class="step-num" data-i18n="step1Num"></div>
          <div class="icon-badge">⏰</div>
          <h3 data-i18n="step1Title"></h3>
          <p data-i18n="step1Text"></p>
        </div>
        <div class="card">
          <div class="step-num" data-i18n="step2Num"></div>
          <div class="icon-badge">🎥</div>
          <h3 data-i18n="step2Title"></h3>
          <p data-i18n="step2Text"></p>
        </div>
        <div class="card">
          <div class="step-num" data-i18n="step3Num"></div>
          <div class="icon-badge">🧭</div>
          <h3 data-i18n="step3Title"></h3>
          <p data-i18n="step3Text"></p>
        </div>
      </div>
    </div>
  </section>

  <section id="words-video">
    <div class="wrap video-showcase">
      <div class="video-frame">
        <video autoplay muted loop playsinline controls preload="metadata" poster="assets/note.jpg">
          <source src="assets/summary-words.mp4" type="video/mp4">
        </video>
        <div class="video-meta">
          <span data-i18n="videoMetaLeft"></span>
          <span data-i18n="videoMetaRight"></span>
        </div>
      </div>
      <div>
        <div class="section-head" style="margin-bottom:14px;">
          <div class="label" data-i18n="videoLabel"></div>
          <h2 data-i18n="videoTitle"></h2>
          <p data-i18n="videoText"></p>
        </div>
        <div class="video-points">
          <div class="point"><strong data-i18n="videoPoint1Title"></strong><span data-i18n="videoPoint1Text"></span></div>
          <div class="point"><strong data-i18n="videoPoint2Title"></strong><span data-i18n="videoPoint2Text"></span></div>
          <div class="point"><strong data-i18n="videoPoint3Title"></strong><span data-i18n="videoPoint3Text"></span></div>
        </div>
      </div>
    </div>
  </section>

  <section id="why">
    <div class="wrap showcase">
      <div class="card showcase-copy">
        <div class="section-head" style="margin-bottom:14px;">
          <div class="label" data-i18n="whyLabel"></div>
          <h2 data-i18n="whyTitle"></h2>
          <p data-i18n="whyText"></p>
        </div>
        <ul>
          <li data-i18n="why1"></li>
          <li data-i18n="why2"></li>
          <li data-i18n="why3"></li>
          <li data-i18n="why4"></li>
        </ul>
      </div>
      <div class="screens-grid">
        <div class="screen-card">
          <img src="assets/settings.jpg" alt="Settings screen">
          <div class="caption" data-i18n="screen1"></div>
        </div>
        <div class="screen-card">
          <img src="assets/about.jpg" alt="About screen">
          <div class="caption" data-i18n="screen2"></div>
        </div>
      </div>
    </div>
  </section>

  <section>
    <div class="wrap quote">
      <div class="card">
        <blockquote data-i18n="quote"></blockquote>
        <div class="pills">
          <span class="pill" data-i18n="aud1"></span>
          <span class="pill" data-i18n="aud2"></span>
          <span class="pill" data-i18n="aud3"></span>
          <span class="pill" data-i18n="aud4"></span>
        </div>
      </div>
      <div class="card">
        <div class="section-head" style="margin-bottom: 10px;">
          <div class="label" data-i18n="forWhoLabel"></div>
          <h2 data-i18n="forWhoTitle"></h2>
        </div>
        <p data-i18n="forWhoText"></p>
      </div>
    </div>
  </section>

  <section id="premium">
    <div class="wrap">
      <div class="section-head">
        <div class="label" data-i18n="premiumLabel"></div>
        <h2 data-i18n="premiumTitle"></h2>
        <p data-i18n="premiumText"></p>
      </div>
      <div class="pricing">
        <div class="plan basic">
          <div class="tag" data-i18n="planBasicTag"></div>
          <div class="price" data-i18n="planBasicPrice"></div>
          <p data-i18n="planBasicText"></p>
          <ul>
            <li data-i18n="basic1"></li>
            <li data-i18n="basic2"></li>
            <li data-i18n="basic3"></li>
            <li data-i18n="basic4"></li>
          </ul>
        </div>
        <div class="plan featured">
          <div class="tag" data-i18n="planPremiumTag"></div>
          <div class="price" data-i18n="planPremiumPrice"></div>
          <p data-i18n="planPremiumText"></p>
          <ul>
            <li data-i18n="premium1"></li>
            <li data-i18n="premium2"></li>
            <li data-i18n="premium3"></li>
            <li data-i18n="premium4"></li>
          </ul>
        </div>
      </div>
    </div>
  </section>

  <section id="faq">
    <div class="wrap card faq">
      <div class="section-head" style="margin-bottom: 8px;">
        <div class="label" data-i18n="faqLabel"></div>
        <h2 data-i18n="faqTitle"></h2>
      </div>
      <div class="item"><h3 data-i18n="faq1q"></h3><p data-i18n="faq1a"></p></div>

    const browserLang = (navigator.language || 'en').slice(0,2).toLowerCase();

    function applyLang(current) {
      const t = copy[current] || copy.en;
      document.documentElement.lang = current;
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (t[key] !== undefined) el.textContent = t[key];
      });
      langButtons.forEach(btn => btn.classList.toggle('active', btn.dataset.lang === current));
      localStorage.setItem('privo_lang', current);
      const suffix = '?lang=' + current;
      document.getElementById('privacyButton').href = '/privacy/' + suffix;
      document.getElementById('privacyLinkFooter').href = '/privacy/' + suffix;

      const url = new URL(location.href);
      url.searchParams.set('lang', current);
      history.replaceState({}, '', url);
      document.title = 'PrivoDiary – ' + t.heroEyebrow;
      const desc = document.querySelector('meta[name="description"]');
      if (desc) desc.setAttribute('content', t.heroText);
    }

    langButtons.forEach(btn => btn.addEventListener('click', () => applyLang(btn.dataset.lang)));
    applyLang(lang);
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
