<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PrivoDiary Privacy Policy</title>
  <meta name="description" content="Privacy Policy for PrivoDiary mobile application." />
  <style>
    :root {
      --bg: #0b1020;
      --panel: rgba(18, 24, 44, 0.88);
      --panel-2: rgba(25, 32, 58, 0.92);
      --text: #edf1fb;
      --muted: #aeb8d3;
      --accent: #8ba4ff;
      --accent-2: #c0ccff;
      --line: rgba(255,255,255,0.09);
      --soft: rgba(139,164,255,0.12);
      --max: 980px;
      --shadow: 0 16px 40px rgba(0,0,0,0.28);
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      color: var(--text);
      line-height: 1.68;
      background:
        radial-gradient(circle at top right, rgba(139,164,255,0.18), transparent 28%),
        radial-gradient(circle at top left, rgba(88,111,201,0.12), transparent 22%),
        linear-gradient(180deg, #070b16 0%, #0b1020 100%);
    }
    .wrap { width: min(calc(100% - 32px), var(--max)); margin: 0 auto; }
    header {
      padding: 48px 0 24px;
      border-bottom: 1px solid var(--line);
    }
    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
    }
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid rgba(139,164,255,0.25);
      background: rgba(139,164,255,0.08);
      color: var(--accent-2);
      font-size: 14px;
      margin-bottom: 18px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(34px, 6vw, 56px);
      line-height: 1.04;
      letter-spacing: -0.03em;
    }
    .subtitle {
      margin: 0;
      max-width: 760px;
      font-size: 18px;
      color: var(--muted);
    }
    .meta {
      margin-top: 18px;
      color: var(--muted);
      font-size: 14px;
    }
    .lang-box {
      min-width: 190px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(12px);
    }
    .lang-label {
      display: block;
      margin-bottom: 8px;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }
    select {
      width: 100%;
      border: 1px solid rgba(139,164,255,0.22);
      border-radius: 12px;
      padding: 10px 12px;
      background: #0f1529;
      color: var(--text);
      font: inherit;
    }
    .utility-links {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .utility-links a {
      color: var(--accent-2);
      text-decoration: none;
      font-size: 13px;
    }
    nav {
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(12px);
      background: rgba(11, 16, 32, 0.78);
      border-bottom: 1px solid var(--line);
    }
    nav .wrap {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 12px 0;
    }
    nav a {
      white-space: nowrap;
      text-decoration: none;
      color: var(--muted);
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.04);
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 14px;
    }
    nav a:hover, a:hover { color: var(--text); border-color: rgba(139,164,255,0.35); }
    main { padding: 28px 0 64px; }
    .note {
      margin-bottom: 18px;
      padding: 16px 18px;
      border-radius: 18px;
      border: 1px solid rgba(139,164,255,0.18);
      background: rgba(139,164,255,0.07);
      color: var(--accent-2);
    }
    .card {
      background: linear-gradient(180deg, var(--panel), var(--panel-2));
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 28px;
      margin-bottom: 18px;
      box-shadow: var(--shadow);
    }
    h2 {
      margin: 0 0 14px;
      font-size: 24px;
      letter-spacing: -0.02em;
    }
    p, li { color: var(--text); }
    ul { padding-left: 22px; }
    strong { color: #fff; }
    .muted { color: var(--muted); }
    .contact-box {
      margin-top: 12px;
      padding: 16px 18px;
      border: 1px dashed rgba(139,164,255,0.34);
      border-radius: 16px;
      background: rgba(139,164,255,0.06);
    }
    code.inline {
      background: rgba(255,255,255,0.08);
      padding: 2px 6px;
      border-radius: 6px;
      color: #e8edff;
    }
    footer {
      padding: 20px 0 48px;
      color: var(--muted);
      border-top: 1px solid var(--line);
    }
    @media (max-width: 720px) {
      .topbar { flex-direction: column; }
      .lang-box { width: 100%; }
      .card { padding: 22px; border-radius: 20px; }
      .subtitle { font-size: 16px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <div class="topbar">
        <div>
          <div class="eyebrow" id="eyebrow"></div>
          <h1 id="pageTitle"></h1>
          <p class="subtitle" id="pageSubtitle"></p>
          <div class="meta" id="pageMeta"></div>
        </div>
        <div class="lang-box">
          <label class="lang-label" id="langLabel" for="langSelect"></label>
          <select id="langSelect" aria-label="Language selector">
            <option value="en">English</option>
            <option value="es">Español</option>
            <option value="ru">Русский</option>
          </select>
          <div class="utility-links">
            <a href="/terms/" id="termsLinkTop"></a>
          </div>
        </div>
      </div>
    </div>
  </header>
  <nav>
    <div class="wrap" id="navLinks"></div>
  </nav>
  <main class="wrap">
    <div class="note" id="introNote"></div>
    <div id="content"></div>
  </main>
  <footer>
    <div class="wrap" id="footerText"></div>
  </footer>
  <script>
    const translations = {

        langLabel: 'Language',
        termsLink: 'Terms of Service',
        introNote: 'Short version: video diary content stays on your device. PrivoDiary uses Google Sign-In and may process limited account-related data only to provide access to the app and premium features.',
        nav: [
          ['terms', '/terms/', 'Terms'],

          ['contact', '#contact', 'Contact']
        ],
        sections: [
          ['overview', '1. Overview', `<p>PrivoDiary is a personal video diary application that prompts users to create short entries during the day.</p><p>The app is designed primarily to operate locally on the user’s device. Video diary content is not uploaded to external servers as part of the app’s core functionality unless the user deliberately exports or shares it by using third-party tools or services.</p><p>PrivoDiary uses <strong>Google Sign-In</strong> and may process limited account-related data that is necessary to authenticate the user, determine access to premium features, and keep the app working as intended.</p>`],
          ['collect', '2. Data we collect', `<p>Depending on the features you use, PrivoDiary may process the following categories of data:</p><ul><li><strong>Account information</strong> — such as your email address, Google account identifier, display name, and other basic profile data provided through Google Sign-In.</li><li><strong>User-created content</strong> — such as video diary entries, optional notes, tags, timestamps, and related metadata stored locally on your device.</li><li><strong>Device permissions</strong> — such as camera, microphone, notifications, and media access, used only to enable the app’s functions on your device.</li><li><strong>Subscription or access status</strong> — information necessary to determine whether premium features are available to your account.</li></ul><p class="muted">PrivoDiary does not upload or remotely store user video diary content as part of its core functionality.</p>`],
          ['use', '3. How data is used', `<ul><li>To authenticate users through Google Sign-In.</li><li>To provide access to the application and premium features, where applicable.</li><li>To let you record, save, organise, review, and export diary entries on your device.</li><li>To send local reminders or notifications that you enable.</li><li>To compile recorded clips into daily summary videos on your device.</li><li>To comply with legal obligations, where required.</li></ul>`],
          ['sharing', '4. Data sharing and disclosure', `<p>PrivoDiary does <strong>not sell</strong> user personal data.</p><p>User-created video diary content remains stored locally on the device and is not shared by PrivoDiary with third parties as part of the app’s core functionality.</p><p>Certain limited account-related data may be processed by third parties where necessary to support sign-in, app distribution, subscription management, or payment processing, including Google and app store platforms, under their own privacy policies and terms.</p><p>If you choose to export, transfer, back up, or share your content by using third-party apps, cloud services, social networks, file managers, or device tools, those actions are performed at <strong>your own discretion and responsibility</strong>.</p>`],
          ['storage', '5. Data storage, retention, and security', `<p>Video diary content is stored locally on your device. PrivoDiary does not maintain external storage of your video diary content as part of its core functionality.</p><p>Limited account-related information associated with Google Sign-In or subscription status may be processed to provide access to the app and its premium functions.</p><p>We implement reasonable technical and organisational measures designed to protect personal information. However, no method of storage, transmission, or security system can be guaranteed to be completely secure. Therefore, absolute security cannot be assured.</p><ul><li><strong>Local storage</strong> — diary videos and related content are stored on your device.</li><li><strong>Retention</strong> — locally stored content remains on your device until you delete it, uninstall the app, or otherwise remove it.</li></ul><p>You are responsible for protecting access to your device, your Google account, exported files, backups, and any third-party services you use.</p>`],
          ['permissions', '6. Permissions', `<p>Depending on your device and the features you enable, PrivoDiary may request:</p><ul><li><strong>Camera</strong> — to record diary videos.</li><li><strong>Microphone</strong> — to capture audio together with video recordings.</li><li><strong>Notifications</strong> — to send recording reminders.</li><li><strong>Photos / Media / Files</strong> — to save, read, export, and compile video content where required.</li></ul><p>You can manage permissions through your device settings. Disabling certain permissions may limit the app’s functionality.</p>`],
          ['transfers', '7. International data transfers', `<p>PrivoDiary does not transfer user-created video diary content to external servers as part of its core functionality.</p><p>Where limited account-related data is processed by third-party providers such as Google, such processing may involve international data transfers in accordance with those providers’ legal safeguards and policies.</p>`],
          ['rights', '8. Your rights and choices', `<p>Depending on your location, you may have rights to:</p><ul><li>Access personal data processed in connection with your account.</li><li>Request correction of inaccurate account data.</li><li>Request deletion of personal data where applicable.</li><li>Delete locally stored diary content directly from the app or your device.</li><li>Withdraw consent where processing is based on consent.</li><li>Stop using the app at any time.</li></ul>`],
          ['children', '9. Children’s privacy', `<p>PrivoDiary is not intended for children under the age required by applicable law in their jurisdiction unless specifically stated otherwise.</p><p>The app does not knowingly collect personal data from children in violation of applicable law.</p>`],
          ['third-party', '10. Third-party services', `<p>PrivoDiary may rely on third-party services where necessary to support app functionality, including <strong>Google Sign-In</strong>, <strong>Google Play</strong>, and <strong>Google Play Billing</strong>.</p><p>Such third-party services may process personal data in accordance with their own terms and privacy policies.</p>`],
          ['changes', '11. Changes to this Privacy Policy', `<p>We may update this Privacy Policy from time to time. When we do, we will revise the effective date shown at the top of this page. Material changes may also be communicated through the app or by other appropriate means.</p>`],
          ['contact', '12. Contact us', `<p>If you have questions, requests, or concerns about this Privacy Policy or the app’s privacy practices, contact us here:</p><div class="contact-box"><strong>Yurii Gakhanov</strong><br>Email: <code class="inline">privodiary@gmail.com</code><br>Address: <code class="inline">C. Daganzo 3, 28028 Madrid, Spain</code></div>`]
        ],
        footer: '© <span id="year"></span> PrivoDiary. All rights reserved.'
      },
      ru: {
        htmlLang: 'ru',
        title: 'PrivoDiary — Политика конфиденциальности',
        description: 'Политика конфиденциальности мобильного приложения PrivoDiary.',
        eyebrow: 'PrivoDiary · Правовая информация',
        pageTitle: 'Политика конфиденциальности',
        pageSubtitle: 'В этом документе объясняется, как PrivoDiary обрабатывает информацию при использовании мобильного приложения.',
        pageMeta: 'Дата вступления в силу: <strong>08 марта 2026 г.</strong><br>Название приложения: <strong>PrivoDiary</strong><br>Разработчик / издатель: <strong>Yurii Gakhanov</strong>',
        langLabel: 'Язык',
        termsLink: 'Пользовательское соглашение',
        introNote: 'Коротко: видеодневник хранится на вашем устройстве. PrivoDiary использует Google Sign-In и обрабатывает только ограниченные данные аккаунта, необходимые для входа в приложение и работы премиум-функций.',
        nav: [
          ['terms', '/terms/', 'Условия'],
          ['overview', '#overview', 'Обзор'],
          ['collect', '#collect', 'Данные'],
          ['use', '#use', 'Использование'],
          ['sharing', '#sharing', 'Передача'],
          ['storage', '#storage', 'Хранение'],
          ['rights', '#rights', 'Ваши права'],
          ['children', '#children', 'Дети'],
          ['changes', '#changes', 'Изменения'],
          ['contact', '#contact', 'Контакты']
        ],
        sections: [
          ['overview', '1. Общие положения', `<p>PrivoDiary — это приложение видеодневника, которое несколько раз в день предлагает пользователю записывать короткие личные видео.</p><p>Приложение в первую очередь работает <strong>локально на устройстве пользователя</strong>. Пользовательский видеоконтент не загружается на внешние серверы как часть основного функционала приложения, если только сам пользователь не экспортирует или не отправляет его с помощью сторонних сервисов.</p><p>PrivoDiary использует <strong>Google Sign-In</strong> и может обрабатывать ограниченные данные, связанные с аккаунтом, если это необходимо для аутентификации, предоставления доступа к премиум-функциям и корректной работы приложения.</p>`],
          ['collect', '2. Какие данные могут обрабатываться', `<p>В зависимости от того, какими функциями вы пользуетесь, PrivoDiary может обрабатывать следующие категории данных:</p><ul><li><strong>Данные аккаунта</strong> — например, адрес электронной почты, идентификатор Google-аккаунта, имя профиля и иные базовые сведения, передаваемые через Google Sign-In.</li><li><strong>Пользовательский контент</strong> — видеозаписи дневника, необязательные текстовые заметки, теги, отметки времени и связанная с ними метаинформация, которая хранится локально на вашем устройстве.</li><li><strong>Разрешения устройства</strong> — доступ к камере, микрофону, уведомлениям и медиатеке, используемый только для работы функций приложения на вашем устройстве.</li><li><strong>Статус подписки или доступа</strong> — сведения, необходимые для определения того, доступны ли вашему аккаунту премиум-функции.</li></ul><p class="muted">PrivoDiary не загружает и не хранит пользовательский видеоконтент на удалённых серверах в рамках своего основного функционала.</p>`],
          ['use', '3. Для чего используются данные', `<ul><li>Для аутентификации пользователей через Google Sign-In.</li><li>Для предоставления доступа к приложению и премиум-функциям, если они оформлены.</li><li>Для записи, сохранения, организации, просмотра и экспорта дневниковых записей на вашем устройстве.</li><li>Для отправки локальных напоминаний и уведомлений, которые вы включили.</li><li>Для сборки ежедневных видеосводок из сохранённых роликов непосредственно на вашем устройстве.</li><li>Для соблюдения требований законодательства, когда это необходимо.</li></ul>`],
          ['sharing', '4. Передача и раскрытие данных', `<p>PrivoDiary <strong>не продаёт</strong> персональные данные пользователей.</p><p>Пользовательский видеоконтент остаётся на устройстве и не передаётся PrivoDiary третьим лицам как часть основного функционала приложения.</p><p>Определённые ограниченные данные аккаунта могут обрабатываться третьими лицами, если это необходимо для входа в приложение, распространения приложения, управления подпиской или обработки платежей, включая Google и магазины приложений. Такая обработка регулируется их собственными документами и правилами.</p><p>Если вы самостоятельно экспортируете, резервируете, переносите или публикуете свой контент с помощью сторонних приложений, облачных сервисов, социальных сетей, файловых менеджеров или инструментов устройства, такие действия совершаются <strong>по вашему усмотрению и под вашу ответственность</strong>.</p>`],
          ['storage', '5. Хранение, срок хранения и безопасность', `<p>Видеоконтент дневника хранится локально на вашем устройстве. PrivoDiary не поддерживает внешнее хранение этого контента как часть основного функционала приложения.</p><p>Ограниченные сведения, связанные с Google Sign-In или статусом подписки, могут обрабатываться в объёме, необходимом для доступа к приложению и его премиум-функциям.</p><p>Мы принимаем разумные технические и организационные меры, направленные на защиту персональной информации. Однако ни один способ хранения, передачи данных или система защиты не могут гарантировать абсолютную безопасность. Поэтому абсолютная безопасность не гарантируется.</p><ul><li><strong>Локальное хранение</strong> — видеозаписи и связанный контент хранятся на вашем устройстве.</li><li><strong>Срок хранения</strong> — локально сохранённый контент остаётся на устройстве до тех пор, пока вы не удалите его, не удалите приложение или не уберёте данные иным способом.</li></ul><p>Вы самостоятельно отвечаете за защиту доступа к вашему устройству, вашему Google-аккаунту, экспортированным файлам, резервным копиям и выбранным вами сторонним сервисам.</p>`],
          ['permissions', '6. Разрешения', `<p>В зависимости от устройства и включённых функций PrivoDiary может запрашивать:</p><ul><li><strong>Камеру</strong> — для записи видеодневника.</li><li><strong>Микрофон</strong> — для записи звука вместе с видео.</li><li><strong>Уведомления</strong> — для напоминаний о записи моментов.</li><li><strong>Фото / медиа / файлы</strong> — для сохранения, чтения, экспорта и сборки видеоконтента.</li></ul><p>Управлять разрешениями можно через настройки устройства. Отключение отдельных разрешений может ограничить работу приложения.</p>`],
          ['transfers', '7. Международная передача данных', `<p>PrivoDiary не передаёт пользовательский видеоконтент на внешние серверы в рамках своего основного функционала.</p><p>Если ограниченные данные аккаунта обрабатываются сторонними провайдерами, такими как Google, такая обработка может включать международную передачу данных в соответствии с их политиками и применимыми правовыми гарантиями.</p>`],
          ['rights', '8. Ваши права и выбор', `<p>В зависимости от вашей юрисдикции у вас могут быть следующие права:</p><ul><li>получить доступ к данным, которые обрабатываются в связи с вашим аккаунтом;</li><li>требовать исправления неточных данных аккаунта;</li><li>требовать удаления персональных данных, если это применимо;</li><li>удалять локально сохранённый контент прямо в приложении или на устройстве;</li><li>отозвать согласие, если обработка основана на согласии;</li><li>прекратить использование приложения в любой момент.</li></ul>`],
          ['children', '9. Конфиденциальность детей', `<p>PrivoDiary не предназначено для детей младше возраста, установленного применимым законодательством их юрисдикции, если прямо не указано иное.</p><p>Приложение не собирает осознанно персональные данные детей с нарушением применимого законодательства.</p>`],

    function detectLanguage() {
      const params = new URLSearchParams(window.location.search);
      const explicit = params.get('lang');
      if (explicit && translations[explicit]) return explicit;
      const saved = localStorage.getItem('privo_lang');
      if (saved && translations[saved]) return saved;
      const browser = (navigator.language || 'en').slice(0,2).toLowerCase();
      return translations[browser] ? browser : 'en';
    }

    function withLang(url, lang) {
      const absolute = new URL(url, window.location.origin);
      absolute.searchParams.set('lang', lang);
      if (window.location.pathname.includes('/terms/')) {
        absolute.pathname = '/terms/';
      }
      return absolute.pathname + absolute.search;
    }

    function render(lang) {
      const t = translations[lang];
      document.documentElement.lang = t.htmlLang;
      document.title = t.title;
      document.querySelector('meta[name="description"]').setAttribute('content', t.description);
      document.getElementById('eyebrow').textContent = t.eyebrow;
      document.getElementById('pageTitle').textContent = t.pageTitle;
      document.getElementById('pageSubtitle').textContent = t.pageSubtitle;
      document.getElementById('pageMeta').innerHTML = t.pageMeta;
      document.getElementById('langLabel').textContent = t.langLabel;
      document.getElementById('termsLinkTop').textContent = t.termsLink;
      document.getElementById('termsLinkTop').href = withLang('/terms/', lang);
      document.getElementById('introNote').textContent = t.introNote;
      document.getElementById('footerText').innerHTML = t.footer;
      document.getElementById('year').textContent = new Date().getFullYear();

      const nav = document.getElementById('navLinks');
      nav.innerHTML = t.nav.map(([id, href, label]) => `<a href="${href.startsWith('#') ? href : withLang(href, lang)}" data-id="${id}">${label}</a>`).join('');

      const content = document.getElementById('content');
      content.innerHTML = t.sections.map(([id, title, html]) => `<section id="${id}" class="card"><h2>${title}</h2>${html}</section>`).join('');

      document.getElementById('langSelect').value = lang;
      localStorage.setItem('privo_lang', lang);

      const url = new URL(window.location.href);
      url.searchParams.set('lang', lang);
      history.replaceState({}, '', url.pathname + url.search + url.hash);
    }

    const initialLang = detectLanguage();
    document.getElementById('langSelect').addEventListener('change', (e) => render(e.target.value));
    render(initialLang);
  </script>
