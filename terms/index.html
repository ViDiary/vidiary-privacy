      const browser = (navigator.language || 'en').slice(0,2).toLowerCase();
      return translations[browser] ? browser : 'en';
    }
    function withLang(url, lang) {
      const absolute = new URL(url, window.location.origin);
      absolute.searchParams.set('lang', lang);
      if (window.location.pathname.includes('/terms/')) absolute.pathname = '/';
      return absolute.pathname + absolute.search;
    }
    function render(lang) {
      const t = translations[lang];
      document.documentElement.lang = t.htmlLang;
      document.title = t.title;
      document.querySelector('meta[name="description"]').setAttribute('content', t.description);
      document.getElementById('eyebrow').textContent = t.eyebrow;
      document.getElementById('pageTitle').textContent = t.pageTitle;
      document.getElementById('pageSubtitle').textContent = t.pageSubtitle;
      document.getElementById('pageMeta').innerHTML = t.pageMeta;
      document.getElementById('langLabel').textContent = t.langLabel;
      document.getElementById('privacyLinkTop').textContent = t.privacyLink;
      document.getElementById('privacyLinkTop').href = withLang('/', lang);
      document.getElementById('introNote').textContent = t.introNote;
      document.getElementById('footerText').innerHTML = t.footer;
      document.getElementById('year').textContent = new Date().getFullYear();
      document.getElementById('navLinks').innerHTML = t.nav.map(([id, href, label]) => `<a href="${href.startsWith('#') ? href : withLang(href, lang)}" data-id="${id}">${label}</a>`).join('');
      document.getElementById('content').innerHTML = t.sections.map(([id, title, html]) => `<section id="${id}" class="card"><h2>${title}</h2>${html}</section>`).join('');
      document.getElementById('langSelect').value = lang;
      localStorage.setItem('privo_lang', lang);
      const url = new URL(window.location.href);
      url.searchParams.set('lang', lang);
      history.replaceState({}, '', url.pathname + url.search + url.hash);
    }
    const initialLang = detectLanguage();
    document.getElementById('langSelect').addEventListener('change', (e) => render(e.target.value));
    render(initialLang);
  </script>
</body>
</html>
